services:
  db:
    image: postgres:16-alpine
    container_name: rdt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-raizes_da_terra}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-raizes_da_terra}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rdt-api:
    build:
      context: ./rdt-api
      dockerfile: Dockerfile
    image: rdt-api:latest
    container_name: rdt-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.api
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ${UPLOAD_PATH:-./uploads}:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  rdt-web-client:
    build:
      context: ./rdt-web-client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: rdt-web-client:latest
    container_name: rdt-web-client
    restart: unless-stopped
    depends_on:
      rdt-api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:8080"

volumes:
  postgres_data:
